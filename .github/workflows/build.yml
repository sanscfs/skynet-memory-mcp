name: Build and Push
on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          push: true
          network: host
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
      - name: Update infra repo
        if: success()
        env:
          TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          TAG="${{ github.sha }}"
          git clone https://x-access-token:${TOKEN}@github.com/sanscfs/infra.git /tmp/infra
          cd /tmp/infra
          git config user.name "Skynet CI"
          git config user.email "skynet@sanscfs.dev"
          UPDATED=false
          for HELM_VALUES in "skynet-apps/${REPO_NAME}/values.yaml" "infra-apps/${REPO_NAME}/values.yaml"; do
            if [ -f "$HELM_VALUES" ]; then
              sed -i "s|^\(  tag: \).*|\\1\"${TAG}\"|" "$HELM_VALUES"
              UPDATED=true
            fi
          done
          if [ "$UPDATED" = true ]; then
            git add -A
            git diff --cached --quiet || git commit -m "ci(${REPO_NAME}): update image to ${TAG}"
            git push
          fi
